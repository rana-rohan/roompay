<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomPay</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#000;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            text-align:center;
            width:90%;
            max-width:420px;
        }

        h1{
            color:#7fffd4;
            margin-bottom:35px;
            font-size:34px;
        }

        a{
            text-decoration:none;
        }

        button{
            width:100%;
            padding:18px;
            margin:12px 0;
            border:none;
            border-radius:14px;
            font-size:22px;
            font-weight:bold;
            background:#7fffd4;
            color:#000;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#00ccaa;
            transform:scale(1.03);
        }

        .footer{
            margin-top:25px;
            color:#888;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Select Person To Pay</h1>

    </a>

        RoomPay • Enter Your Own Amount
    </div>

</div>
